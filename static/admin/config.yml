# when using the default proxy server port
# local_backend: true

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: MadebyMonkeys/jackvangestel.nl
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/8ed5b983-4de6-41b6-8bf3-01f602ed705c/pkce
  auth_token_endpoint: /sites/8ed5b983-4de6-41b6-8bf3-01f602ed705c/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://jackvangestel.nl

media_folder: "static/media"
public_folder: "/media"

collections:
  - name: "settings"
    label: "settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General settings"
        file: "hugo.yaml"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "logo", label: "Logo", widget: "image" }


      - name: "socials"
        label: "Social Media Links"
        file: "data/shared/socials.yml"
        fields:
          - name: "list"
            label: "Social Media Links"
            widget: "list"
            fields:
              - { name: "platform", label: "Platform", widget: "string" }
              - { name: "icon", label: "Icon", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
              - { name: "handle", label: "Handle", widget: "string" }
                  


  - name: "home"
    label: "Home page"
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "Pagina settings"
        file: "content/_index.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "description", label: "Page Description", widget: "text" }
          - label: "SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "hero"
        label: "Hero Section"
        file: "data/home/hero.yml"
        fields:
          - { name: "intro", label: "Intro", widget: "string" }
          - { name: "title", label: "Title", widget: "string" }
          - name: "image"
            label: "Image"
            widget: "object"
            fields:
              - { name: "url", label: "URL", widget: "image" }
              - { name: "alt", label: "Alt Text", widget: "string" }
          - { name: "video_id", label: "Video id", widget: "string" }


      - name: "spotify"
        label: "Spotify Section"
        file: "data/home/spotify.yml"
        fields:
          - { name: "intro", label: "Intro", widget: "string" }
          - { name: "title", label: "Title", widget: "string" }
          - name: "spotify"
            label: "Spotify"
            widget: "object"
            fields:
              - { name: "type", label: "Type", widget: "select", options: ["album", "track", "artist"] }
              - { name: "id", label: "ID", widget: "string" }


      - name: "about"
        label: "About Section"
        file: "data/home/about.yml"
        fields:
          - { name: "intro", label: "Intro", widget: "string" }
          - { name: "title", label: "Title", widget: "string" }
          - { name: "body", label: "Body", widget: "markdown" }
          - { name: "image", label: "Image", widget: "image" }
          - name: "link"
            label: "Link"
            widget: "object"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "url", label: "Page", widget: "string" }



      - name: "gallery"
        label: "Gallery Section"
        file: "data/home/gallery.yml"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Beschrijving", widget: "string" }
          - name: "images"
            label: "Images"
            widget: "list"
            required: true
            fields:
            - { name: "name", label: "Name", widget: "string" }
            - { name: "image", label: "Image", widget: "image" }



  - name: "about"
    label: "About page"
    editor:
      preview: false
    file: ""
    files:
      - name: "about"
        label: "About Section"
        file: "content/about/_index.md"
        create: false
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Beschrijving", widget: "text" }
          - label: "SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Beschrijving", name: "description", widget: "text" }
          - { name: "body", label: "Content", widget: "markdown" }
          - { name: "image", label: "Image", widget: "image" }

      - name: "gallery"
        label: "Gallery Section"
        file: "data/about/gallery.yml"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Beschrijving", widget: "string" }
          - name: "images"
            label: "Images"
            widget: "list"
            required: true
            fields:
            - { name: "name", label: "Name", widget: "string" }
            - { name: "image", label: "Image", widget: "image" }



  - name: "gallery"
    label: "Gallery page"
    editor:
      preview: false
    file: ""
    files:
      - name: "gallery"
        label: "Gallery Section"
        file: "content/gallery/_index.md"
        create: false
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Beschrijving", widget: "string" }
          - label: "SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschrijving", name: "description", widget: "text" }



  - name: "contact"
    label: "Contact page"
    editor:
      preview: false
    files:
      - name: "contact"
        label: "Contact Section"
        file: "content/contact/_index.md"
        create: false
        fields:
          - { name: "title", label: "Titel", widget: "string" }
          - { name: "body", label: "Content", widget: "markdown" }
          - label: "SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschrijving", name: "description", widget: "text" }



  - name: "booking"
    label: "Boekingen page"
    editor:
      preview: false
    file: ""
    files:
      - name: "booking"
        label: "Boekingen Section"
        file: "content/booking/_index.md"
        create: false
        fields:
          - { name: "title", label: "Titel", widget: "string" }
          - { name: "body", label: "Content", widget: "markdown" }
          - label: "SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschrijving", name: "description", widget: "text" }


  - name: "videos"
    label: "Video lijst"
    delete: false
    editor:
      preview: false
    files:
      - name: "video_list"
        label: "Video Section"
        file: "data/shared/videos.yml"
        fields:
          - name: "title"
            label: "Title"
            widget: "string"
          - name: "description"
            label: "Description"
            widget: "text"
          - name: "video_list"
            label: "Video List"
            widget: "list"
            fields:
              - name: "title"
                label: "Video Title"
                widget: "string"
              - name: "video_id"
                label: "Video ID"
                widget: "string"
              - name: "image"
                label: "Image"
                widget: "image"



  - name: "galleries"
    label: "Gallerij Albums"
    folder: "content/gallery"
    create: true
    editor:
      preview: false
    label_singular: 'Gallery'
    slug: "{{slug}}"
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    filter: { field: "visible", value: true }
    fields:
      - {label: "Visible", name: "visible", widget: hidden, default: true}
      - { name: "title", label: "Titel", widget: "string" }
      - { name: "description", label: "Beschrijving", widget: "text" }
      - label: "SEO"
        name: "meta"
        widget: "object"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Beschrijving", name: "description", widget: "text" }
      - { name: "date", label: "Datum", widget: "datetime", date_format: "YYYY-MM-DD" }
      - { name: "cover_image", label: "Cover image", widget: "image",  }
      - name: "images"
        label: "Album Images"
        widget: "list"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "image", label: "Image", widget: "image" }
